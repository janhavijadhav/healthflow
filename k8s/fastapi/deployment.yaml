apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthflow-api
  namespace: healthflow
  labels:
    app: healthflow-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: healthflow-api
  template:
    metadata:
      labels:
        app: healthflow-api
    spec:
      containers:
        - name: healthflow-api
          image: healthflow-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: RAW_BUCKET
              value: "healthflow-raw-dev-805046891516"
            - name: PROCESSED_BUCKET
              value: "healthflow-processed-dev-805046891516"
            - name: GCP_PROJECT
              value: "healthflow-analytics-500100"
            - name: BQ_DATASET
              value: "healthflow_dev"
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
          envFrom:
            - secretRef:
                name: healthflow-aws-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
