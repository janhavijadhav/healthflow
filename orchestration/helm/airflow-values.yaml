executor: LocalExecutor

env:
  - name: RAW_BUCKET
    value: "healthflow-raw-dev-805046891516"
  - name: PROCESSED_BUCKET
    value: "healthflow-processed-dev-805046891516"
  - name: CURATED_BUCKET
    value: "healthflow-curated-dev-805046891516"
  - name: GCP_PROJECT
    value: "healthflow-analytics-500100"
  - name: BQ_DATASET
    value: "healthflow_dev"
  - name: AWS_DEFAULT_REGION
    value: "us-east-1"

webserver:
  replicas: 1
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  livenessProbe:
    initialDelaySeconds: 60
    periodSeconds: 30
  readinessProbe:
    initialDelaySeconds: 60
    periodSeconds: 30

scheduler:
  replicas: 1
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

workers:
  replicas: 0

triggerer:
  enabled: false

postgresql:
  enabled: true
  primary:
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"

redis:
  enabled: false

statsd:
  enabled: false

dags:
  persistence:
    enabled: false
  gitSync:
    enabled: false

logs:
  persistence:
    enabled: false
