version: 2

models:
  - name: stg_patients
    description: Cleaned patient demographics
    columns:
      - name: patient_id
        description: Unique patient identifier
        tests:
          - unique
          - not_null
      - name: gender
        tests:
          - not_null
          - accepted_values:
              values: ['M', 'F']
      - name: age_years
        tests:
          - not_null

  - name: stg_encounters
    description: Cleaned healthcare encounters
    columns:
      - name: encounter_id
        description: Unique encounter identifier
        tests:
          - unique
          - not_null
      - name: patient_id
        tests:
          - not_null
      - name: total_claim_cost
        tests:
          - not_null

  - name: stg_conditions
    description: Cleaned patient conditions
    columns:
      - name: patient_id
        tests:
          - not_null
      - name: condition_code
        tests:
          - not_null

  - name: stg_medications
    description: Cleaned medications
    columns:
      - name: patient_id
        tests:
          - not_null
      - name: medication_code
        tests:
          - not_null
